name: Deploy PHUBAI-MES

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: phubai-mes-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Windows Server
    runs-on: [self-hosted, windows, phubai-mes]
    timeout-minutes: 30

    env:
      NEXT_TELEMETRY_DISABLED: 1
      DEPLOY_DIR: D:\apps\phubai-mes
      PM2_HOME: D:\apps\phubai-mes\.pm2
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_TRUST_HOST: ${{ secrets.AUTH_TRUST_HOST }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      FEEDBACK_TO: ${{ secrets.FEEDBACK_TO }}

    steps:
      - name: 1. Stop MES PM2 apps (deploy dir + legacy checkout dir)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path $env:PM2_HOME | Out-Null

          # Try deploy dir first (normal path after migration)
          $pm2 = Join-Path $env:DEPLOY_DIR "node_modules\.bin\pm2.cmd"
          if (Test-Path $pm2) {
            Write-Host ">> Stopping MES apps from deploy dir..."
            & $pm2 stop phubai-mes-web 2>$null
            & $pm2 stop phubai-mes-energy-cron 2>$null
          }

          # Fallback: try legacy checkout dir (transition from old workflow)
          $legacyPm2 = Join-Path $env:GITHUB_WORKSPACE "node_modules\.bin\pm2.cmd"
          $legacyHome = Join-Path $env:GITHUB_WORKSPACE ".pm2"
          if (Test-Path $legacyPm2) {
            Write-Host ">> Also stopping from legacy checkout dir..."
            $env:PM2_HOME_BAK = $env:PM2_HOME
            $env:PM2_HOME = $legacyHome
            & $legacyPm2 stop phubai-mes-web 2>$null
            & $legacyPm2 stop phubai-mes-energy-cron 2>$null
            $env:PM2_HOME = $env:PM2_HOME_BAK
          }

          Start-Sleep -Seconds 2

          # Kill any process still on port 3002
          $conn = Get-NetTCPConnection -LocalPort 3002 -ErrorAction SilentlyContinue
          if ($conn) {
            Stop-Process -Id $conn.OwningProcess -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 1
          }

      - name: 2. Checkout source
        uses: actions/checkout@v4

      - name: 3. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 4. Validate required secrets
        shell: powershell
        run: |
          $required = @(
            'DATABASE_URL',
            'NEXTAUTH_URL',
            'NEXTAUTH_SECRET',
            'AUTH_SECRET'
          )
          foreach ($name in $required) {
            $value = [Environment]::GetEnvironmentVariable($name)
            if ([string]::IsNullOrWhiteSpace($value)) {
              throw "Missing required GitHub Actions secret: $name"
            }
          }
          if ([string]::IsNullOrWhiteSpace($env:AUTH_TRUST_HOST)) {
            "AUTH_TRUST_HOST=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: 5. Create production env file
        shell: powershell
        run: |
          $envLines = @(
            'DATABASE_URL="' + $env:DATABASE_URL + '"',
            'NEXTAUTH_URL="' + $env:NEXTAUTH_URL + '"',
            'NEXTAUTH_SECRET="' + $env:NEXTAUTH_SECRET + '"',
            'AUTH_SECRET="' + $env:AUTH_SECRET + '"',
            'AUTH_TRUST_HOST=' + $env:AUTH_TRUST_HOST,
            'SMTP_HOST="' + $env:SMTP_HOST + '"',
            'SMTP_PORT="' + $env:SMTP_PORT + '"',
            'SMTP_USER="' + $env:SMTP_USER + '"',
            'SMTP_PASS="' + $env:SMTP_PASS + '"',
            'FEEDBACK_TO="' + $env:FEEDBACK_TO + '"'
          )
          Set-Content -LiteralPath .env -Encoding utf8 -Value $envLines

      - name: 6. Install dependencies
        run: npm ci --include=dev

      - name: 7. Generate Prisma client
        run: npx prisma generate

      - name: 8. Deploy database migrations
        run: npx prisma migrate deploy

      - name: 9. Build Next.js app
        run: npm run build

      - name: 10. Sync build to deploy directory
        shell: powershell
        run: |
          $src = $env:GITHUB_WORKSPACE
          $dst = $env:DEPLOY_DIR
          New-Item -ItemType Directory -Force -Path $dst | Out-Null

          Write-Host ">> Syncing $src -> $dst ..."
          robocopy $src $dst /MIR /XD .git .github .pm2 /XF .gitignore .gitattributes /NFL /NDL /NP /NS /NC
          if ($LASTEXITCODE -ge 8) {
            throw "Robocopy failed with exit code $LASTEXITCODE"
          }
          Write-Host ">> Sync complete."

      - name: 11. Start MES PM2 apps from deploy directory
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path $env:PM2_HOME | Out-Null
          $pm2 = Join-Path $env:DEPLOY_DIR "node_modules\.bin\pm2.cmd"
          if (!(Test-Path $pm2)) {
            throw "PM2 binary not found at: $pm2"
          }

          Set-Location $env:DEPLOY_DIR
          & $pm2 startOrReload ecosystem.config.cjs --only phubai-mes-web --update-env
          & $pm2 startOrReload ecosystem.config.cjs --only phubai-mes-energy-cron --update-env
          & $pm2 save
          & $pm2 status

          $maxWait = 30
          for ($i = 0; $i -lt $maxWait; $i++) {
            $up = Get-NetTCPConnection -LocalPort 3002 -State Listen -ErrorAction SilentlyContinue
            if ($up) { Write-Host ">> PHUBAI-MES listening on 3002"; break }
            Start-Sleep -Seconds 1
          }

      - name: 12. Fallback restart MES apps on failed deploy
        if: failure()
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path $env:PM2_HOME | Out-Null
          $pm2 = Join-Path $env:DEPLOY_DIR "node_modules\.bin\pm2.cmd"
          if (Test-Path $pm2) {
            Set-Location $env:DEPLOY_DIR
            & $pm2 startOrReload ecosystem.config.cjs --only phubai-mes-web --update-env
            & $pm2 startOrReload ecosystem.config.cjs --only phubai-mes-energy-cron --update-env
            & $pm2 save
          } else {
            Write-Host ">> PM2 not found in deploy dir. Fallback skipped."
          }
